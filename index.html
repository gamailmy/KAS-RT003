<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kas RT</title>

<style>

html,body{
    margin:0;
    height:100%;
    overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;
}

#loader{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:white;
    z-index:999;
}

iframe{
    width:100%;
    height:100%;
    border:0;
    display:none;
}

.spinner{
    width:50px;
    height:50px;
    border:5px solid #ddd;
    border-top:5px solid #1e88e5;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

</style>

</head>
<body>

<div id="loader">
    <div class="spinner"></div>
</div>

<iframe
    id="app"
    src="https://script.google.com/macros/s/AKfycbyx9eUawncWzpM8mWq9Gpb6Muadzm7MmB6_wuPAuyfQbmTfYSpVLvz8vD0_f1vwBb_P/exec"
    allow="camera; geolocation"
    loading="eager">
</iframe>

<script>
const frame=document.getElementById("app");

frame.onload=function(){
    document.getElementById("loader").style.display="none";
    frame.style.display="block";
}
</script>

</body>
</html>
